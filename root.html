<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ROOT TBrowser Online</title>
  <style>
    body, html { margin:0; padding:0; height:100%; font-family: Arial, sans-serif; overflow:hidden; }
    #uploadZone {
      position: absolute; top:0; left:0; width:100%; height:100%;
      background: #f8f9fa; display:flex; align-items:center; justify-content:center;
      flex-direction:column; z-index:100; border:3px dashed #007bff;
    }
    #browserContainer { display:none; width:100%; height:100%; }
    .header { padding:10px; background:#f0f0f0; border-bottom:1px solid #ccc; text-align:center; }
    #hierarchy { width:380px; border-right:1px solid #ccc; overflow:auto; }
    #drawing { flex:1; padding:10px; background:#fff; }
    .container { display:flex; height:calc(100vh - 50px); }
  </style>
</head>
<body>

  <!-- Upload screen -->
  <div id="uploadZone">
    <h1>📤 Upload ROOT File</h1>
    <p>or drag & drop anywhere on the page</p>
    <input type="file" id="fileInput" accept=".root" style="font-size:1.1em; padding:10px;">
    <p style="margin-top:20px; color:#666;">Supported: any .root file (histograms, TTrees, canvases, etc.)</p>
  </div>

  <!-- Browser UI (hidden until file is loaded) -->
  <div id="browserContainer">
    <div class="header">
      <h2>ROOT TBrowser — <span id="filename"></span></h2>
      <button onclick="window.location.reload()">Upload New File</button>
    </div>
    <div class="container">
      <div id="hierarchy"></div>
      <div id="drawing"></div>
    </div>
  </div>

  <script type="module">
    import { HierarchyPainter } from 'https://root.cern/js/latest/modules/gui.mjs';

    let painter = null;

    async function loadROOTFile(file) {
      if (!file) return;

      // Hide upload screen and show browser
      document.getElementById('uploadZone').style.display = 'none';
      document.getElementById('browserContainer').style.display = 'block';
      document.getElementById('filename').textContent = file.name;

      // Create the full TBrowser-like interface
      painter = new HierarchyPainter('jsroot_browser', 'hierarchy');
      
      // "simple" = classic TBrowser layout (left tree + right plot)
      // You can also try "flex", "tabs", "grid2x2" etc.
      painter.setDisplay('simple', 'drawing');

      // This automatically opens the local file and builds the hierarchy
      await painter.openRootFile(file);

      // Optional: expand the first level automatically
      // await painter.expandAll(1);
    }

    // File input
    document.getElementById('fileInput').addEventListener('change', (e) => {
      if (e.target.files.length > 0) loadROOTFile(e.target.files[0]);
    });

    // Drag & drop support
    const zone = document.getElementById('uploadZone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.background = '#e3f2fd'; });
    zone.addEventListener('dragleave', () => { zone.style.background = '#f8f9fa'; });
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.style.background = '#f8f9fa';
      if (e.dataTransfer.files.length > 0) loadROOTFile(e.dataTransfer.files[0]);
    });
  </script>
</body>
</html>
